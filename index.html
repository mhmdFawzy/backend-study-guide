<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backend Study Guide — First Principles</title>
  <meta name="description" content="Interactive backend study guide for frontend engineers. Based on Backend from First Principles playlist." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <button id="nav-toggle" class="nav-toggle" type="button" aria-expanded="false" aria-controls="sidebar" aria-label="Open topics menu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <div class="brand">
        <div class="brand-icon">🎓</div>
        <div>
          <h1>Backend Study Guide</h1>
          <p class="subtitle">Based on <a href="https://www.youtube.com/playlist?list=PLui3EUkuMTPgZcV0QhQrOcwMPcBCcd_Q1" target="_blank" rel="noopener">Backend from First Principles</a></p>
        </div>
      </div>
      <a class="btn btn-outline header-playlist" href="https://www.youtube.com/playlist?list=PLui3EUkuMTPgZcV0QhQrOcwMPcBCcd_Q1" target="_blank" rel="noopener">▶ Playlist</a>
    </div>
  </header>

  <div id="sidebar-overlay" class="sidebar-overlay" hidden></div>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="progress-card">
        <div class="progress-header">
          <span>Your progress</span>
          <span id="progress-count">0/0</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <p class="progress-hint">Mark topics complete or pass the quiz.</p>
      </div>
      <div class="backup-card">
        <div class="backup-header">
          <span>Backup</span>
          <span id="backup-status" class="backup-status">Auto-saved locally</span>
        </div>
        <p class="backup-hint">Notes save automatically in this browser. Download a backup before switching devices or clearing browser data.</p>
        <div class="backup-actions">
          <button id="btn-export-json" type="button" class="btn btn-outline btn-sm">Download backup</button>
          <button id="btn-import-json" type="button" class="btn btn-outline btn-sm">Restore backup</button>
        </div>
        <input id="import-file" type="file" accept="application/json,.json" hidden />
      </div>
      <nav id="nav" class="nav"></nav>
    </aside>

    <main class="main">
      <div class="main-toolbar">
        <span id="concept-badge" class="badge">Concept 1 of 29</span>
        <div class="toolbar-actions">
          <button id="btn-complete" class="btn btn-outline">Mark complete</button>
          <button id="btn-next" class="btn btn-primary">Next topic →</button>
        </div>
      </div>
      <article id="content" class="content"></article>
    </main>
  </div>

  <script type="module" src="js/app.js?v=10"></script>
</body>
</html>
